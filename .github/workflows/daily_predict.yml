name: AI Kyotei Prediction Update

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ONLY latest library
        run: |
          pip uninstall -y google-generativeai  # 古い方を確実に消す
          pip install google-genai             # 新しい方だけを入れる

      - name: Run prediction script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python predict.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Complete update" || echo "No changes"
          git push origin main
