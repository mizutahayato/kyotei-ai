<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI競艇的中ナビ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f4f8; }
        .card { background: white; margin: 20px auto; padding: 20px; border-radius: 15px; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #0077b6; }
        .bet { font-size: 24px; font-weight: bold; color: #e63946; }
        .reason { font-size: 14px; color: #555; text-align: left; }
    </style>
</head>
<body>
    <h1>AI競艇的中ナビ</h1>
    <div class="card">
        <h2>住之江 4R 予想</h2>
        <p>【的中重視の3点】</p>
        <div class="bet">1 - 5 - 2</div>
        <div class="bet">1 - 2 - 5</div>
        <div class="bet">1 - 5 - 3</div>
        <hr>
        <p class="reason">根拠：1号艇桑原選手のイン逃げを軸に、実力最上位の5号艇井内選手を対抗に指名。的中率を最優先した構成です。</p>
    </div>
</body>
</html>
